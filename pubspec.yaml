name: TERKA
description: "Egy alkalmazás adathalászatra a MÁV szervereiről."
publish_to: 'none'
version: 1.5.0+5PRF

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  http: ^1.2.2
  xml: ^6.5.0
  url_launcher: ^6.3.1
  geolocator: ^13.0.2
  shared_preferences: ^2.3.2
  html_unescape: ^2.0.0
  package_info_plus: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
  fonts:
    - family: MNR2007
      fonts:
        - asset: assets/fonts/MNR2007.ttf
